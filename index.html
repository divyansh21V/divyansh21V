<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>9Teen — Your Life OS</title>
  <meta name="description" content="A premium personal life OS. Capture moments, track tasks, and reflect with style.">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="9Teen">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Floating Particles -->
<div id="particles"></div>

<div id="app">
  <!-- ═══════════ HOME ═══════════ -->
  <div class="screen active" id="screenHome">
    <div class="home-hero">
      <div class="greeting" id="greeting">good evening</div>
      <div class="date-display" id="dateDisplay"></div>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num" id="statTasks">0</div><div class="stat-label">Tasks</div></div>
      <div class="stat-card"><div class="stat-num" id="statDone">0</div><div class="stat-label">Done</div></div>
      <div class="stat-card"><div class="stat-num" id="statCaptures">0</div><div class="stat-label">Captures</div></div>
    </div>
    <div class="section-title">Upcoming Tasks</div>
    <div id="homeTaskList"></div>
  </div>

  <!-- ═══════════ CAPTURE ═══════════ -->
  <div class="screen" id="screenCapture">
    <div class="capture-header">
      <h2>Capture a Moment</h2>
      <p>What's alive in you right now?</p>
    </div>
    <div class="media-zone" id="mediaZone" onclick="document.getElementById('mediaInput').click()">
      <div class="placeholder-icon">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <span>Tap to add photo or video</span>
      </div>
      <input type="file" accept="image/*,video/*" capture="environment" id="mediaInput">
    </div>
    <textarea class="capture-text" id="captureText" placeholder="Write something honest..."></textarea>
    <div class="mood-row">
      <button class="mood-btn" data-mood="lit" onclick="selectMood('lit')"><span class="mood-emoji">🔥</span> Lit</button>
      <button class="mood-btn" data-mood="okay" onclick="selectMood('okay')"><span class="mood-emoji">☀️</span> Okay</button>
      <button class="mood-btn" data-mood="heavy" onclick="selectMood('heavy')"><span class="mood-emoji">🌧️</span> Heavy</button>
    </div>
    <div class="capture-actions">
      <button class="btn-clear" onclick="clearCapture()">Clear</button>
      <button class="btn-save" onclick="saveCapture()">Save ✦</button>
    </div>
  </div>

  <!-- ═══════════ TASKS ═══════════ -->
  <div class="screen" id="screenTasks">
    <div class="capture-header">
      <h2>Your Tasks</h2>
      <p>Focus on what matters</p>
    </div>
    <div class="task-input-wrap">
      <input id="taskInput" placeholder="What needs doing?" onkeydown="if(event.key==='Enter')addTask()">
      <button class="add-btn" onclick="addTask()">Add</button>
    </div>
    <div id="taskListFull"></div>
    <div class="task-count" id="taskCount"></div>
  </div>

  <!-- ═══════════ ARCHIVE ═══════════ -->
  <div class="screen" id="screenArchive">
    <div class="capture-header">
      <h2>Your Archive</h2>
      <p>Memories, preserved</p>
    </div>
    <div class="archive-grid" id="archiveGrid"></div>
    <div id="archiveEmpty"></div>
  </div>

  <!-- ═══════════ COMPANION ═══════════ -->
  <div class="screen" id="screenCompanion">
    <div class="chat-container">
      <div class="chat-header">
        <h2>✦ Companion</h2>
        <p>Your reflective AI buddy</p>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-wrap">
        <input id="chatInput" placeholder="Say something..." onkeydown="if(event.key==='Enter')sendChat()">
        <button class="send-btn" onclick="sendChat()">
          <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- ═══════════ DETAIL MODAL ═══════════ -->
  <div class="modal-overlay" id="detailModal" onclick="closeModal(event)">
    <div class="modal-card">
      <button class="modal-close" onclick="closeModal(event)">✕</button>
      <div id="modalContent"></div>
    </div>
  </div>
</div>

<!-- ═══════════ BOTTOM NAV ═══════════ -->
<nav class="nav">
  <button class="active" onclick="navigateTo('home')">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Home
  </button>
  <button onclick="navigateTo('capture')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    Capture
  </button>
  <button onclick="navigateTo('tasks')">
    <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
    Tasks
  </button>
  <button onclick="navigateTo('archive')">
    <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="5" rx="1"/><path d="M4 8v11a2 2 0 002 2h12a2 2 0 002-2V8"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
    Archive
  </button>
  <button onclick="navigateTo('companion')">
    <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
    Chat
  </button>
</nav>

<script src="app.js"></script>
</body>
</html>
